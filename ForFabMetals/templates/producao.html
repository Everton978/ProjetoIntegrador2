<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Produção ForFabio | Apontamento Real-Time</title>
    <link rel="stylesheet" href="{% static 'css/producao.css' %}">

<body>

<nav class="navbar">
    <a href="home.html" class="brand">For<span>Fabio</span> | Indústria 4.0</a>

    <div class="filtros-box">
        <input type="text" id="buscaOS" placeholder="🔍 Buscar por ID da OS ou Nome da Peça..." onkeyup="renderizarProducao()">
        <select id="filtroStatus" onchange="renderizarProducao()">
            <option value="todas">Todos os Status</option>
            <option value="aguardando">🟡 Aguardando Início</option>
            <option value="em_andamento">🔵 Em Execução</option>
            <option value="concluido">🟢 Finalizadas</option>
        </select>

    <div id="container-cards"></div>
